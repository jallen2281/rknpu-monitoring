name: Build NPU Exporter
on:
  push:
    branches: [ main ] # Ensure this matches your actual branch name
jobs:
  build:
    # Use the native ARM64 runner for the RK1
    runs-on: ubuntu-24.04-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
