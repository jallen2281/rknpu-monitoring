apiVersion: v1
kind: ConfigMap
metadata:
  name: rknpu-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1" # Sidecar must be enabled in your Grafana Helm chart
data:
  rknpu-dashboard.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "NPU Core Utilization (Real-time)",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rknpu_load_percent",
              "legendFormat": "{{core}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "#EAB839", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "title": "Utilization History",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "rknpu_load_percent",
              "legendFormat": "{{node}} - {{core}}",
              "refId": "A"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth" }
            }
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["NPU", "Rockchip"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Rockchip NPU Monitoring",
      "uid": "rknpu-monitor-01",
      "version": 1
    }

