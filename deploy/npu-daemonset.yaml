apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rknpu-exporter
  namespace: monitoring
  labels:
    app: rknpu-exporter
spec:
  template:
    spec:
      containers:
      - name: exporter
        image: ghcr.io/jallen2281/rknpu-monitoring:latest
        securityContext:
          privileged: true
        volumeMounts:
        - name: sys-kernel-debug  # <--- ADD THIS
          mountPath: /sys/kernel/debug
          readOnly: true
        - name: sys-devfreq
          mountPath: /sys/class/devfreq
          readOnly: true
        - name: proc-mem
          mountPath: /proc/meminfo
          readOnly: true
      volumes:
      - name: sys-kernel-debug    # <--- ADD THIS
        hostPath:
          path: /sys/kernel/debug
      - name: sys-devfreq
        hostPath:
          path: /sys/class/devfreq
      - name: proc-mem
        hostPath:
          path: /proc/meminfo

